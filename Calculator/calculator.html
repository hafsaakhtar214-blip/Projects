<html>

<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="header">
        <h1>CALCULATOR</h1>
        <button id="dark" class="btnh"><i class="fa-solid fa-moon"></i><span>DARK MODE</span></button>
    </div>
    <div class="calcenter">
        <div class="container">
            <textarea id="textarea" placeholder="0" readonly></textarea>
            <div class="no">
                <button id="ac" class="btn">AC</button>
                <button id="delete" class="btn"><span><i class="fa-solid fa-delete-left"></i></span></button>
                <button id="percent" class="btn"><span><i class="fa-solid fa-percent"></i></span></button>
                <button id="divide" class="btn"><span><i class="fa-solid fa-divide"></i></span></button>
                <button id="seven" class="btn">7</button>
                <button id="eight" class="btn">8</button>
                <button id="nine" class="btn">9</button>
                <button id="multiple" class="btn"><span><i class="fa-solid fa-xmark"></i></span></button>
                <button id="four" class="btn">4</button>
                <button id="five" class="btn">5</button>
                <button id="six" class="btn">6</button>
                <button id="subtract" class="btn"><span><i class="fa-solid fa-minus"></i></span></button>
                <button id="one" class="btn">1</button>
                <button id="two" class="btn">2</button>
                <button id="three" class="btn">3</button>
                <button id="plus" class="btn"><span><i class="fa-solid fa-plus"></i></span></button>
                <button id="zero" class="btn span">0</button>
                <button id="decimal" class="btn" style="font-size: 28px;">.</span></button>
                <button id="equal" class="btn"><span><i class="fa-solid fa-equals"></i></span></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
