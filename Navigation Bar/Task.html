<html>
    <head>
        <title>Task</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    </head>
    <body>
         <div class="header" >
           <button id="m" class="mbtn"><i class="fa-solid fa-bars icon"></i></button>
           <h1>Navigation bar</h1>
           <button id='signin' class="btnend"><i class="fa-solid fa-arrow-right-from-bracket iconm"></i><span>Sign In</span></button>
         </div>
         <div class="menu">
         <button id='dashboard' class="btn"><i class="fa-solid fa-gauge iconm"></i><span>Dashboard</span></button>
         <button id='report' class="btn"><i class="fa-solid fa-chart-line iconm"></i><span>Reports</span></button>
         <button id='profile' class="btn"><i class="fa-solid fa-user iconm"></i><span>Profile</span></button>
         <button id='setting' class="btn"><i class="fa-solid fa-gear iconm"></i><span>Setting</span></button>
         <button id='logout' class="btn end"><i class="fa-solid fa-arrow-right-to-bracket iconm"></i><span>Log out</span></button>
         </div>
         <div class="center">
         <h1>Checking of Navigation Bar</h1>
         <h2 id="d" style="color:purple">This is the dashboard of navigation bar</h2>
         <h2 id="r" style="display:none; color:green">This is the report part of navigation bar</h2>
         <h2 id="p" style="display:none; color:blue">This is the profile part of navigation bar</h2>
         <h2 id="s" style="display:none; color:red">This is the setting part of navigation bar</h2>
         </div>
         <div class="signcenter">
             <div class="sign">
                <h2 class="center">SIGN IN</h2>
                <div class="label">
                <label>&nbsp Email:<br></label>
                <input type="text" placeholder="Enter your Email">
                <label>&nbsp Password:<br></label>
                <input type="password" placeholder="Enter your Password">
                </div>
                <div style="display: flex; justify-content: center;">
                <button class="btn enterbtn">Enter</button>
                </div>
             </div>
         </div>
       <script src="task.js"></script>
</html>
