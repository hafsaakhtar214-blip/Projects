<html>

<head>
    <title>Reaction Tester</title>
    <style>
        #shape {
            width: 200px;
            height: 200px;
            background-color: red;
            display: none;
            position: relative;
        }

        .color {
            color: blue;
        }

        #shape :hover {
            cursor: pointer;
        }

        body {
            font-family: Calibri, sans-serif;
        }
    </style>
</head>

<body>
    <h1 class='color' style="text-align:center">Test Your Reaction!</h1>
    <h3>Click as quickly as you can</h3>
    <h2>Your Time=<span id="total"></span></h2>
    <h2>Your Best Time=<span id="bestTime"></span></h2>
    <div id="shape"></div>
    <script type="text/javascript">
        var start = new Date().getTime();
        function appear() {
            var position = Math.random() * 400;
            var size = Math.random() * 300 + 10;
            function getRandomColor() {
                var letters = '0123456789ABCDEF';
                var color = '#';
                for (var i = 0; i < 6; i++) {
                    color += letters[Math.floor(Math.random() * 16)];
                }
                return color;
            }

            document.getElementById("shape").style.width = size + "px";
            document.getElementById("shape").style.height = size + "px";
            document.getElementById("shape").style.top = position + "px";
            document.getElementById("shape").style.left = position + "px";
            document.getElementById("shape").style.backgroundColor = getRandomColor();
            if (Math.random() > 0.5) {
                document.getElementById("shape").style.borderRadius = "50%";
            }
            else {
                document.getElementById("shape").style.borderRadius = "0%";
            }
            document.getElementById("shape").style.display = "block";
            start = new Date().getTime();
        }
        appear();
        function delayappear() {
            setTimeout(appear, Math.random * 2000);
        }
        var bestTime = null;
        document.getElementById("shape").onclick = function () {
            var end = new Date().getTime();
            document.getElementById("shape").style.display = "none";
            var timetake = end - start;
            var total = timetake / 1000;
            document.getElementById("total").innerHTML = total + "s";
            delayappear();
            if (bestTime === null || total < bestTime) {
                bestTime = total;
                document.getElementById("bestTime").innerHTML = bestTime + "s";
            }
        }

    </script>
</body>

</html>
