<html>
    <head>
        <title>Login</title>
         <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="signmain">
            <div id="signmenu" class="signcenter">
                <div class="sign">
                    <h2 class="center">LOG IN</h2>
                    <div class="label">
                        <label>Email:<br></label>
                        <input type="text" placeholder="Enter your Email">
                        <label>Password:<br></label>
                        <input type="password" placeholder="Enter your Password">
                    </div>
                    <button id="enterb" class="ripplebtn enterbtn" onclick="createRipple(event)">Enter</button>
                    <p class="center" style="margin-bottom: 2px;">Don't have an account? Want to create it?</p>
                    <a href="signup.html"><p style="color: rgb(186, 186, 231); font-weight: bold; text-decoration: underline; margin-top: 0;">
                        CREATE ACCOUNT</p></a>
                </div>
            </div>
        </div>
        <script src="login.js"></script>
    </body>
</html>
