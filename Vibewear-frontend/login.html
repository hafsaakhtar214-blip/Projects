<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VibeWear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="signmain">
    <div id="signmenu" class="signcenter">
      <div class="sign">
        <h2 class="center">LOG IN</h2>
        <div class="label">
          <label>Email:</label>
          <input type="text" placeholder="Enter your Email">
          <label>Password:</label>
          <input type="password" placeholder="Enter your Password">
        </div>
        <button id="enterb" class="btnl">Enter</button>
        <p class="center" style="margin-top:10px;">Don't have an account? Want to create it?</p>
        <a href="signup.html"><p class="link">CREATE ACCOUNT</p></a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
